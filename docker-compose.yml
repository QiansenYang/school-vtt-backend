services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: qiansenyang
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: school_vtt_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://qiansenyang:password123@db:5432/school_vtt_db
    depends_on:
      - db

volumes:
  db_data: